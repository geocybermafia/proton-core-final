    <script>
      // Global fix for 'fetch' property assignment errors and MetaMask/Iframe sandboxing issues
      (function() {
        try {
          if (typeof window !== 'undefined' && window.fetch) {
            const originalFetch = window.fetch;
            const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
            if (descriptor && !descriptor.set && descriptor.configurable) {
              Object.defineProperty(window, 'fetch', {
                get: function() { return originalFetch; },
                set: function() { /* Ignore attempts to overwrite fetch */ },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {
          // Fallback or ignore if cannot modify
        }

        // Global Node.js process polyfill with Proxy
        try {
          if (typeof window !== 'undefined') {
            let rawProcess = window.process || { env: { NODE_ENV: 'development' } };
            const processHandler = {
              get(target, prop) {
                if (prop === 'env') {
                  return target.env || { NODE_ENV: 'development' };
                }
                if (prop === 'argv') return target.argv || [];
                if (prop === 'platform') return target.platform || 'browser';
                if (prop === 'browser') return true;
                
                // Event emitter stubs
                if (['on', 'once', 'off', 'addListener', 'removeListener', 'removeAllListeners'].includes(prop)) {
                  return target[prop] || function() { return this; };
                }
                if (prop === 'emit') {
                  return target[prop] || function() { return true; };
                }
                
                const val = Reflect.get(target, prop);
                if (typeof val === 'function') {
                  return val.bind(target);
                }
                return val;
              },
              set(target, prop, value) {
                return Reflect.set(target, prop, value);
              }
            };

            let processProxy = new Proxy(rawProcess, processHandler);

            Object.defineProperty(window, 'process', {
              get: () => processProxy,
              set: (newVal) => {
                if (newVal && typeof newVal === 'object') {
                  rawProcess = Object.assign(rawProcess, newVal);
                } else {
                  rawProcess = newVal;
                }
                processProxy = new Proxy(rawProcess || {}, processHandler);
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // ignore
        }

        // Chrome extension API fallback for iframe sandboxing
        try {
          if (typeof window !== 'undefined') {
            const noop = function() {};
            const mockListener = {
              addListener: noop,
              removeListener: noop,
              hasListener: function() { return false; },
              hasListeners: function() { return false; }
            };
            const mockPort = {
              onMessage: mockListener,
              onDisconnect: mockListener,
              postMessage: noop,
              disconnect: noop,
            };
            
            let rawChrome = window.chrome || {};
            const chromeHandler = {
              get(target, prop) {
                if (prop === 'runtime') {
                  return target.runtime || {
                    connect: function() { return mockPort; },
                    sendMessage: noop,
                    onMessage: mockListener,
                    onConnect: mockListener,
                    onDisconnect: mockListener,
                    getURL: function(path) { return path || ''; },
                    id: 'mock-extension-id'
                  };
                }
                return target[prop];
              }
            };

            let chromeProxy = new Proxy(rawChrome, chromeHandler);
            Object.defineProperty(window, 'chrome', {
              get: () => chromeProxy,
              set: (newVal) => {
                rawChrome = newVal || {};
                chromeProxy = new Proxy(rawChrome, chromeHandler);
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // ignore
        }

        // window.ethereum fallback for sandboxed iframe compatibility with Proxy
        try {
          if (typeof window !== 'undefined') {
            let rawEthereum = window.ethereum;
            const ethHandler = {
              get(target, prop, receiver) {
                if (!target) return undefined;
                if (prop === 'emit') {
                  return target.emit || function() { return true; };
                }
                if (['addListener', 'on'].includes(prop)) {
                  return target.addListener || target.on || function() { return this; };
                }
                if (['removeListener', 'off'].includes(prop)) {
                  return target.removeListener || target.off || function() { return this; };
                }
                const val = Reflect.get(target, prop, receiver);
                if (typeof val === 'function') {
                  return val.bind(target);
                }
                return val;
              }
            };

            Object.defineProperty(window, 'ethereum', {
              get: () => {
                if (!rawEthereum) return undefined;
                return new Proxy(rawEthereum, ethHandler);
              },
              set: (newVal) => {
                rawEthereum = newVal;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          // ignore
        }

        // Global window error listener to swallow benign extension sandboxing errors
        try {
          if (typeof window !== 'undefined') {
            window.addEventListener('error', function(event) {
              const msg = event.message || '';
              if (
                msg.includes("reading 'emit'") ||
                msg.includes("reading 'addListener'") ||
                msg.includes("reading 'runtime'") ||
                msg.includes("Extension context invalidated") ||
                (msg.includes("Cannot read properties of undefined") && (msg.includes("emit") || msg.includes("addListener") || msg.includes("onMessage")))
              ) {
                event.stopImmediatePropagation();
                event.preventDefault();
                return true;
              }
            }, true);

            window.addEventListener('unhandledrejection', function(event) {
              const reason = event.reason || {};
              const msg = reason.message || String(reason);
              if (
                msg.includes("reading 'emit'") ||
                msg.includes("reading 'addListener'") ||
                msg.includes("reading 'runtime'") ||
                msg.includes("Extension context invalidated") ||
                (msg.includes("Cannot read properties of undefined") && (msg.includes("emit") || msg.includes("addListener") || msg.includes("onMessage")))
              ) {
                event.stopImmediatePropagation();
                event.preventDefault();
                return true;
              }
            }, true);
          }
        } catch (e) {
          // ignore
        }
      })();
