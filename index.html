      // Global fix for 'fetch' property assignment errors and MetaMask/Iframe sandboxing issues

        try {

        }

        // Global Node.js process polyfill for browser compatibility

                env: { NODE_ENV: 'development' },

                off: function() { return this; },
                emit: function() { return true; },
                addListener: function() { return this; },
                removeListener: function() { return this; },

              p.once = p.once || function() { return this; };
              p.off = p.off || function() { return this; };
              p.emit = p.emit || function() { return true; };

              p.removeListener = p.removeListener || function() { return this; };

            }

            // Chrome extension API fallback for iframe sandboxing
            if (typeof window.chrome === 'undefined') {

            }
            if (typeof window.chrome.runtime === 'undefined') {
              const noop = function() {};
              const mockPort = {
                onMessage: { addListener: noop, removeListener: noop },
                onDisconnect: { addListener: noop, removeListener: noop },
                postMessage: noop,
                disconnect: noop,
              };
              window.chrome.runtime = {
                connect: function() { return mockPort; },
                sendMessage: noop,
                onMessage: { addListener: noop, removeListener: noop },

            // window.ethereum fallback for sandboxed iframe compatibility

                eth.on = eth.on || eth.addListener || function() { return this; };
                eth.off = eth.off || eth.removeListener || function() { return this; };
              } catch (e) {

                  const originalEth = window.ethereum;
                  const ethProxy = new Proxy(originalEth, {
                    get: function(target, prop, receiver) {

                      }

                      }

                        return target.removeListener || target.off || function() { return this; };
                      }

                        return target.on || target.addListener || function() { return this; };
                      }
                      if (prop === 'off') {
                        return target.off || target.removeListener || function() { return this; };
                      }
                      const val = Reflect.get(target, prop, receiver);
                      if (typeof val === 'function') {

                      }
                      return val;
                    }

                    value: ethProxy,
                    configurable: true,

                  });
                } catch (proxyError) {
